<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuumi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <!-- Main view -->
    <div id="view-main" class="view active">
        <div class="header">
            <div class="header-bg"></div>
            <div class="header-content" id="header-content">
                <img src="../icon48.png" alt="" class="logo" id="logo">
                <div class="header-text">
                    <div class="title">Yuumi</div>
                    <div class="subtitle">Compagnon Airtable</div>
                </div>
                <button class="icon-btn settings-btn" id="btn-open-settings" title="Paramètres">
                    <svg width="15" height="15" viewBox="0 0 20 20" fill="none">
                        <path d="M10 13a3 3 0 100-6 3 3 0 000 6z" stroke="currentColor" stroke-width="1.6"/>
                        <path d="M10 1v2M10 17v2M1 10h2M17 10h2M3.22 3.22l1.42 1.42M15.36 15.36l1.42 1.42M3.22 16.78l1.42-1.42M15.36 4.64l1.42-1.42" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
        </div>

        <div class="body">
            <div class="section">
                <div class="section-label">
                    <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><circle cx="5" cy="5" r="5"/></svg>
                    Tableaux visibles
                </div>
                <div class="configs-list" id="configs-list"></div>
                <div class="hint" id="hint">Aucune sélection = tout afficher</div>
            </div>
        </div>

        <div class="footer">
            <a href="https://airtable.com/app7Nqnx527uH5yre" target="_blank">
                <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M1 9L9 1M9 1H3M9 1v6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Ouvrir Airtable
            </a>
            <a href="https://github.com/Noferu/yuumi-for-airtable" target="_blank" class="author-link">
                <svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor">
                    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38v-1.33c-2.24.49-2.71-1.08-2.71-1.08-.36-.93-.89-1.17-.89-1.17-.73-.5.05-.49.05-.49.8.06 1.23.83 1.23.83.71 1.22 1.87.87 2.33.66.07-.52.28-.87.5-1.07-1.78-.2-3.65-.89-3.65-3.97 0-.88.31-1.6.83-2.16-.08-.2-.36-1.02.08-2.13 0 0 .67-.21 2.2.82A7.69 7.69 0 018 3.8c.68 0 1.36.09 2 .27 1.52-1.03 2.2-.82 2.2-.82.44 1.11.16 1.93.08 2.13.52.56.83 1.28.83 2.16 0 3.09-1.87 3.77-3.66 3.97.29.25.54.73.54 1.48v2.19c0 .21.15.46.55.38C13.71 14.53 16 11.54 16 8c0-4.42-3.58-8-8-8z"/>
                </svg>
                Voir l'auteur
            </a>
        </div>
    </div>

    <!-- Settings view -->
    <div id="view-settings" class="view">
        <div class="settings-header">
            <button class="icon-btn back-btn" id="btn-back">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                    <path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <span class="settings-title">Paramètres</span>
            <button class="text-btn reset-btn" id="btn-reset-all">Réinitialiser</button>
        </div>

        <div class="settings-tabs">
            <button class="tab-btn active" data-tab="links">Liens menu</button>
            <button class="tab-btn" data-tab="tables">Tables</button>
        </div>

        <!-- Links tab -->
        <div class="tab-content active" id="tab-links">
            <div class="settings-list" id="links-list"></div>
            <button class="add-btn" id="btn-add-link">
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
                Ajouter un lien
            </button>
        </div>

        <!-- Tables tab -->
        <div class="tab-content" id="tab-tables">
            <div class="settings-list" id="tables-list"></div>
            <button class="add-btn" id="btn-add-table-config">
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
                Ajouter une config
            </button>
            <div class="pinned-section">
                <div class="section-label" style="margin-bottom:6px">
                    <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><circle cx="5" cy="5" r="5"/></svg>
                    Tables épinglées (toujours visibles)
                </div>
                <div id="pinned-list" class="settings-list"></div>
                <button class="add-btn" id="btn-add-pinned">
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
                    Épingler un ID de table
                </button>
            </div>
        </div>

        <div class="settings-footer">
            <button class="save-btn" id="btn-save-settings">Enregistrer</button>
        </div>
    </div>

    <script src="../config.js"></script>
    <script src="popup.js"></script>
</body>
</html>
